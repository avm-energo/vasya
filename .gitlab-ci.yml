stages:
  - test
  - build

image: node:22.17

variables:
  NODE_ENV: test
  CI: 'true'
  JEST_JUNIT_OUTPUT: junit.xml

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

before_script:
  - npm ci

unit_test:
  stage: test
  script:
    - echo "Running unit tests..."
    - npm run test:unit -- --ci --reporters=default --reporters=jest-junit
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
  tags:
    - vue3
  only:
    - branches

build:
  stage: build
  script:
    - echo "Building Vue 3 app..."
    - npm run build
  artifacts:
    paths:
      - dist/
  tags:
    - vue3
  only:
    - branches