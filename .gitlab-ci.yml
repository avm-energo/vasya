stages:
  - test
  - build

image: node:22.17-alpine

variables:
  NODE_ENV: test
  CI: 'true'

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm
    - node_modules/

before_script:
  - npm ci

unit_test:
  stage: test
  script:
    - echo "Running unit tests..."
    - npm run test:junit
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
  tags:
    - vue3
  only:
    refs:
      - test
      - merge_requests
      - main